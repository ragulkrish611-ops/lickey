<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LicenseOS — Dashboard</title>
<link rel="stylesheet" href="../assets/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-dot"></span>
      <div>
        <div class="brand-name">LicenseOS</div>
        <div class="brand-sub">Control Panel</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="sites.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M3 12h18"/></svg>
        Sites
      </a>
      <a href="add-site.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
        Add Site
      </a>
      <a href="snippet.html" class="nav-item">
        <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Embed Code
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-dot"></div>
      <span>Firebase Connected</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-sub">Live overview of all license activity</p>
      </div>
      <a href="add-site.html" class="btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>
        Add Site
      </a>
    </header>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card" style="--delay:0.05s">
        <div class="stat-label">Total Sites</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:100%;background:var(--accent)"></div></div>
      </div>
      <div class="stat-card" style="--delay:0.1s">
        <div class="stat-label">Active</div>
        <div class="stat-value green" id="statActive">—</div>
        <div class="stat-bar"><div class="stat-bar-fill green" id="barActive"></div></div>
      </div>
      <div class="stat-card" style="--delay:0.15s">
        <div class="stat-label">Expired</div>
        <div class="stat-value red" id="statExpired">—</div>
        <div class="stat-bar"><div class="stat-bar-fill red" id="barExpired"></div></div>
      </div>
      <div class="stat-card" style="--delay:0.2s">
        <div class="stat-label">Expiring ≤ 7d</div>
        <div class="stat-value amber" id="statSoon">—</div>
        <div class="stat-bar"><div class="stat-bar-fill amber" id="barSoon"></div></div>
      </div>
    </div>

    <!-- Recent Sites Table -->
    <section class="card" style="--delay:0.25s">
      <div class="card-header">
        <span class="card-title">Recent Sites</span>
        <a href="sites.html" class="link-muted">View all →</a>
      </div>
      <table class="data-table" id="recentTable">
        <thead>
          <tr>
            <th>Domain</th>
            <th>License Key</th>
            <th>Plan</th>
            <th>Expiry</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recentBody"></tbody>
      </table>
    </section>

    <!-- Expiry Timeline -->
    <section class="card" style="--delay:0.3s">
      <div class="card-header"><span class="card-title">Expiry Timeline</span></div>
      <div class="timeline" id="timeline"></div>
    </section>

  </main>
</div>

<div id="toast" class="toast"></div>

<script src="../assets/db.js"></script>
<script src="../assets/app.js"></script>
<script>
  renderDashboard();
</script>
</body>
</html>
